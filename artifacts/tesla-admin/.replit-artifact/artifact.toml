kind = "web"
previewPath = "/tesla-admin/"
title = "Tesla Invest Admin"
version = "1.0.0"
id = "artifacts/tesla-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tesla-admin/" ]
localPort = 19724

[services.development]
run = "pnpm --filter @workspace/tesla-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tesla-admin", "run", "build" ]
publicDir = "artifacts/tesla-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19724"
BASE_PATH = "/tesla-admin/"
